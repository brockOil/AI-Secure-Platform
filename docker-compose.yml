services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiplatform}
      POSTGRES_DB: ${POSTGRES_DB:-aiplatform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiplatform} -d ${POSTGRES_DB:-aiplatform}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiplatform}:${POSTGRES_PASSWORD:-aiplatform}@db:5432/${POSTGRES_DB:-aiplatform}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"

  frontend-v3:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3002:80"

volumes:
  pgdata:
